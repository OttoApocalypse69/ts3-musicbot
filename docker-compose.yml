services:
  ts3-musicbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ts3-musicbot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inject the variables configured in .env into the container environment.
      # The entrypoint.sh script reads these and writes them to the config file.
      - TS3_API_KEY=${TS3_API_KEY}
      - TS3_SERVER_ADDRESS=${TS3_SERVER_ADDRESS}
      - TS3_SERVER_PORT=${TS3_SERVER_PORT:-9987}
      - TS3_SERVER_PASSWORD=${TS3_SERVER_PASSWORD}
      - TS3_CHANNEL_NAME=${TS3_CHANNEL_NAME}
      - TS3_CHANNEL_PASSWORD=${TS3_CHANNEL_PASSWORD}
      - TS3_CHANNEL_FILE_PATH=${TS3_CHANNEL_FILE_PATH}
      - TS3_NICKNAME=${TS3_NICKNAME:-MusicBot}
      - TS3_MARKET=${TS3_MARKET:-US}
      - TS3_SPOTIFY_PLAYER=${TS3_SPOTIFY_PLAYER:-disabled}
      - TS3_SPOTIFY_USERNAME=${TS3_SPOTIFY_USERNAME}
      - TS3_SPOTIFY_PASSWORD=${TS3_SPOTIFY_PASSWORD}
      - TS3_USE_OFFICIAL_TSCLIENT=${TS3_USE_OFFICIAL_TSCLIENT:-true}
      - TS3_ACCEPT_TS_LICENSE=${TS3_ACCEPT_TS_LICENSE:-true}
      - TS3_SC_VOLUME=${TS3_SC_VOLUME:-50}
      - TS3_YT_VOLUME=${TS3_YT_VOLUME:-50}
      - TS3_BC_VOLUME=${TS3_BC_VOLUME:-50}
      - TS3_YT_API_KEY=${TS3_YT_API_KEY}
      - TS3_SP_API_KEY=${TS3_SP_API_KEY}
      - TS3_SP_CLIENT_ID=${TS3_SP_CLIENT_ID}
      - TS3_SP_CLIENT_SECRET=${TS3_SP_CLIENT_SECRET}
      - TS3_MUSIC_PERMISSION_NICKNAMES=${TS3_MUSIC_PERMISSION_NICKNAMES:-}
      - TS3_MUSIC_PERMISSION_SERVER_GROUPS=${TS3_MUSIC_PERMISSION_SERVER_GROUPS:-}
      - TS3_MUSIC_PERMISSION_CHANNEL_GROUPS=${TS3_MUSIC_PERMISSION_CHANNEL_GROUPS:-}
      - TS3_ADMIN_PERMISSION_NICKNAMES=${TS3_ADMIN_PERMISSION_NICKNAMES:-}
      - TS3_ADMIN_PERMISSION_SERVER_GROUPS=${TS3_ADMIN_PERMISSION_SERVER_GROUPS:-}
      - TS3_ADMIN_PERMISSION_CHANNEL_GROUPS=${TS3_ADMIN_PERMISSION_CHANNEL_GROUPS:-}
      - TS3_OWNER_NICKNAMES=${TS3_OWNER_NICKNAMES:-}
      - TS3_COMMAND_COOLDOWN_SECONDS=${TS3_COMMAND_COOLDOWN_SECONDS:-3}
      - TS3_COMMAND_PREFIX=${TS3_COMMAND_PREFIX:-!}
      - TS3_HELP_COMMAND=${TS3_HELP_COMMAND:-help}
      - TS3_PLAY_COMMAND=${TS3_PLAY_COMMAND:-play}
      - TS3_QUEUE_ADD_COMMAND=${TS3_QUEUE_ADD_COMMAND:-queue-add}
      - TS3_QUEUE_PLAYNEXT_COMMAND=${TS3_QUEUE_PLAYNEXT_COMMAND:-queue-playnext}
      - TS3_QUEUE_PLAYNOW_COMMAND=${TS3_QUEUE_PLAYNOW_COMMAND:-queue-playnow}
      - TS3_QUEUE_PLAY_COMMAND=${TS3_QUEUE_PLAY_COMMAND:-queue-play}
      - TS3_QUEUE_LIST_COMMAND=${TS3_QUEUE_LIST_COMMAND:-queue}
      - TS3_QUEUE_DELETE_COMMAND=${TS3_QUEUE_DELETE_COMMAND:-queue-delete}
      - TS3_QUEUE_CLEAR_COMMAND=${TS3_QUEUE_CLEAR_COMMAND:-clear}
      - TS3_QUEUE_SHUFFLE_COMMAND=${TS3_QUEUE_SHUFFLE_COMMAND:-shuffle}
      - TS3_QUEUE_SKIP_COMMAND=${TS3_QUEUE_SKIP_COMMAND:-skip}
      - TS3_QUEUE_MOVE_COMMAND=${TS3_QUEUE_MOVE_COMMAND:-queue-move}
      - TS3_QUEUE_STOP_COMMAND=${TS3_QUEUE_STOP_COMMAND:-stop}
      - TS3_QUEUE_STATUS_COMMAND=${TS3_QUEUE_STATUS_COMMAND:-queue-status}
      - TS3_QUEUE_NOWPLAYING_COMMAND=${TS3_QUEUE_NOWPLAYING_COMMAND:-nowplaying}
      - TS3_QUEUE_PAUSE_COMMAND=${TS3_QUEUE_PAUSE_COMMAND:-pause}
      - TS3_QUEUE_RESUME_COMMAND=${TS3_QUEUE_RESUME_COMMAND:-resume}
      - TS3_QUEUE_REPEAT_COMMAND=${TS3_QUEUE_REPEAT_COMMAND:-queue-repeat}
      - TS3_HEALTH_COMMAND=${TS3_HEALTH_COMMAND:-health}
      - TS3_SEEK_COMMAND=${TS3_SEEK_COMMAND:-seek}
      - TS3_HISTORY_COMMAND=${TS3_HISTORY_COMMAND:-history}
      - TS3_REPLAY_COMMAND=${TS3_REPLAY_COMMAND:-replay}
      - TS3_LOOP_COMMAND=${TS3_LOOP_COMMAND:-loop}
      - TS3_LOOP_QUEUE_COMMAND=${TS3_LOOP_QUEUE_COMMAND:-loopqueue}
      - TS3_LOOP_OFF_COMMAND=${TS3_LOOP_OFF_COMMAND:-loopoff}
      - TS3_LOOP_STATUS_COMMAND=${TS3_LOOP_STATUS_COMMAND:-loopstatus}
      - TS3_VOLUME_COMMAND=${TS3_VOLUME_COMMAND:-volume}
      - TS3_VOLUME_SHORT_COMMAND=${TS3_VOLUME_SHORT_COMMAND:-vol}
      - TS3_VOLUME_UP_COMMAND=${TS3_VOLUME_UP_COMMAND:-volumeup}
      - TS3_VOLUME_UP_SHORT_COMMAND=${TS3_VOLUME_UP_SHORT_COMMAND:-volup}
      - TS3_VOLUME_DOWN_COMMAND=${TS3_VOLUME_DOWN_COMMAND:-volumedown}
      - TS3_VOLUME_DOWN_SHORT_COMMAND=${TS3_VOLUME_DOWN_SHORT_COMMAND:-voldown}
      - TS3_VOLUME_MUTE_COMMAND=${TS3_VOLUME_MUTE_COMMAND:-mute}
    volumes:
      # Persistent volumes to preserve configurations, cache files, and auth tokens.
      # This prevents losing client authorizations and cache data on container restarts.
      - ts3_config:/home/ts3bot/.ts3client
      - spotify_cache:/home/ts3bot/.cache
      - spotify_config:/home/ts3bot/.config
    ports:
      # Optional mapping to access the local TeamSpeak ClientQuery interface from the host.
      - "25639:25639"
      # Optional local web dashboard.
      - "8080:8080"
    # D-Bus and PulseAudio inside the container run securely without requiring host privileges.
    # We do NOT require privileged mode.
    # Security options for Chromium sandbox environments used by spotify clients if needed
    security_opt:
      - seccomp:unconfined

volumes:
  ts3_config:
    name: ts3_bot_config
  spotify_cache:
    name: ts3_spotify_cache
  spotify_config:
    name: ts3_spotify_config
